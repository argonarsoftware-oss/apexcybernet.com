<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argonar — Offline</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0f0f13;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
}
.icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; }
p { color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
button {
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.7rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
}
</style>
</head>
<body>
    <div>
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>No internet connection right now.<br>Check your signal and try again.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
