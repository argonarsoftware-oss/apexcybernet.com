# Argonar voice signaling proxy
# Paste this inside your <VirtualHost *:443> block for argonar.co
# (or include from /etc/apache2/sites-available/argonar.co-le-ssl.conf)
#
# Requires: mod_proxy, mod_proxy_http, mod_headers

<IfModule mod_proxy.c>
    # Disable forward proxying (only reverse proxy)
    ProxyRequests Off

    # Preserve Host so Node can log correctly
    ProxyPreserveHost On

    # SSE support: disable response buffering + turn off keepalive timeout
    <Location /rtc/>
        ProxyPass        http://127.0.0.1:3000/rtc/ connectiontimeout=5 timeout=300 keepalive=On
        ProxyPassReverse http://127.0.0.1:3000/rtc/

        # Do not buffer responses — required for SSE to flush events immediately
        SetEnv proxy-sendchunked 1
        SetEnv proxy-nokeepalive 0
        Header set X-Accel-Buffering "no"
    </Location>
</IfModule>
