<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="aGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Subtle glow background -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Left half of A -->
  <path d="M30 6 L6 58 h10 L30 18z" fill="url(#aGrad)"/>
  <!-- Right half of A (lighter for depth) -->
  <path d="M34 6 L58 58 h-10 L34 18z" fill="url(#aGrad)" opacity="0.8"/>
  <!-- Swoosh arc -->
  <path d="M10 50 Q34 26 56 42" stroke="url(#arcGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
